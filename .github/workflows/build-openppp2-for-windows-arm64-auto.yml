name: PPP PRIVATE NETWORK™ 2 WINDOWS ARM64 BUILD (AUTO)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-11-arm]
        arch: [arm64]
        platform:
          - windows/arm64

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - name: Checkout openppp2
      uses: actions/checkout@v4
      with:
        repository: liulilittle/openppp2
        path: openppp2

    - name: Get number of CPUs
      run: |
        echo "ncpu=$env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV
      shell: powershell

    - name: Setup vcpkg
      run: |
        if (-not (Test-Path "vcpkg")) {
          git clone https://github.com/Microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
        }
        echo "${{ github.workspace }}\vcpkg" >> $env:GITHUB_PATH
      shell: powershell

    - name: Install dependencies via vcpkg (NO jemalloc)
      run: |
        # 移除 jemalloc，避免 ARM64 构建失败
        vcpkg install --triplet arm64-windows `
          boost-system boost-thread boost-asio boost-program-options `
          openssl `
          --clean-after-build
      shell: powershell

    - name: Set THIRD_PARTY_LIBRARY_DIR
      run: |
        echo "THIRD_PARTY_LIBRARY_DIR=${{ github.workspace }}\vcpkg\installed\arm64-windows" >> $env:GITHUB_ENV
      shell: powershell

    - name: Print environment variables
      run: |
        Write-Host "ncpu:$env:ncpu"
        Write-Host "THIRD_PARTY_LIBRARY_DIR:$env:THIRD_PARTY_LIBRARY_DIR"
      shell: powershell

    - name: Replace THIRD_PARTY_LIBRARY_DIR in CMakeLists.txt
      run: |
        cd openppp2
        (Get-Content CMakeLists.txt) -replace 'SET\(THIRD_PARTY_LIBRARY_DIR .*\)', 'SET(THIRD_PARTY_LIBRARY_DIR $ENV{THIRD_PARTY_LIBRARY_DIR})' | Set-Content CMakeLists.txt
      shell: powershell

    - name: Disable jemalloc in CMakeLists.txt (ARM64 workaround)
      run: |
        cd openppp2
        # 注释掉 jemalloc 相关的查找和链接指令
        (Get-Content CMakeLists.txt) -replace 'find_package\(jemalloc', '# find_package(jemalloc' | Set-Content CMakeLists.txt
        (Get-Content CMakeLists.txt) -replace 'target_link_libraries\(.*jemalloc', '# target_link_libraries(... jemalloc' | Set-Content CMakeLists.txt
        Write-Host "Jemalloc references commented out."
      shell: powershell

    - name: Configure CMake for Windows ARM64
      run: |
        cd openppp2
        mkdir -p build
        cd build
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A ARM64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"
      shell: powershell

    - name: Build openppp2
      run: |
        cd openppp2\build
        cmake --build . --config Release --parallel $env:ncpu
      shell: powershell

    - name: Package artifact
      run: |
        $artifact = "openppp2-windows-arm64.zip"
        $binPath = "openppp2\bin\Release"
        if (Test-Path $binPath) {
          Compress-Archive -Path $binPath\* -DestinationPath openppp2\bin\$artifact
        } else {
          Compress-Archive -Path openppp2\build\Release\* -DestinationPath openppp2\bin\$artifact
        }
        echo "ARTIFACT_NAME=$artifact" >> $env:GITHUB_ENV
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openppp2-windows-arm64
        path: openppp2\bin\${{ env.ARTIFACT_NAME }}
