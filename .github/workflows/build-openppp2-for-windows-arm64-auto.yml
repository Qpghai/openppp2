name: PPP PRIVATE NETWORK(TM) 2 WINDOWS ARM64 BUILD SCRIPT.(X) 1.0.0 VERSION.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm                # ✅ 必须使用 ARM64 原生运行器

    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        platform: [ARM64]                  # ✅ 平台改为 ARM64

    env:
      VCPKG_DEFAULT_TRIPLET: arm64-windows-static   # ✅ ARM64 静态三元组

    steps:
      - name: Checkout openppp2
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: ''

      - name: Install vcpkg dependencies (NO jemalloc)
        shell: pwsh
        run: |
          # 移除 jemalloc，避免 ARM64 构建失败
          vcpkg install `
            boost-system:$env:VCPKG_DEFAULT_TRIPLET `
            boost-coroutine:$env:VCPKG_DEFAULT_TRIPLET `
            boost-thread:$env:VCPKG_DEFAULT_TRIPLET `
            boost-context:$env:VCPKG_DEFAULT_TRIPLET `
            boost-regex:$env:VCPKG_DEFAULT_TRIPLET `
            boost-filesystem:$env:VCPKG_DEFAULT_TRIPLET `
            openssl:$env:VCPKG_DEFAULT_TRIPLET

      - name: Restore solution packages
        shell: pwsh
        run: nuget restore .\ppp.sln

      - name: Build openppp2 (ARM64)
        shell: pwsh
        run: |
          msbuild .\ppp.sln /m /restore `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:VcpkgEnableManifest=false `
            /p:VcpkgEnabled=true `
            /p:VcpkgUseStatic=true `
            /p:PreferredToolArchitecture=amd64_arm64   # ✅ 指定交叉工具链

      - name: Collect Windows artifacts (ARM64 paths)
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          # ARM64 输出目录通常为 ARM64\Release 或 bin\ARM64\Release
          $outputDir = Join-Path $env:GITHUB_WORKSPACE '${{ matrix.platform }}\${{ matrix.configuration }}'
          if (-not (Test-Path $outputDir)) {
            $outputDir = Join-Path $env:GITHUB_WORKSPACE 'bin\${{ matrix.platform }}\${{ matrix.configuration }}'
          }
          if (-not (Test-Path $outputDir)) {
            throw "Build output directory not found. Tried: $outputDir"
          }

          $files = @('ppp.exe', 'PaperAirplane.dll', 'wintun.dll')
          foreach ($file in $files) {
            $source = Join-Path $outputDir $file
            if (Test-Path $source) {
              Copy-Item $source $artifactDir -Force
            }
          }

          # ARM64 驱动后备路径
          $fallbackFiles = @(
            @{ Source = 'Driver\ARM64\PaperAirplane.dll'; Target = 'PaperAirplane.dll' },
            @{ Source = 'Driver\ARM64\sysproxy64.exe'; Target = 'sysproxy64.exe' }
          )
          foreach ($file in $fallbackFiles) {
            $source = Join-Path $env:GITHUB_WORKSPACE $file.Source
            $target = Join-Path $artifactDir $file.Target
            if ((-not (Test-Path $target)) -and (Test-Path $source)) {
              Copy-Item $source $target -Force
            }
          }

          $resourceFiles = @(
            'appsettings.json',
            'cacert.pem',
            'cacert.sha256',
            'dns-rules.txt',
            'firewall-rules.txt',
            'ip.txt',
            'cmcc.txt',
            'starrylink.net.key',
            'starrylink.net.pem'
          )
          foreach ($file in $resourceFiles) {
            $source = Join-Path $env:GITHUB_WORKSPACE $file
            if (Test-Path $source) {
              Copy-Item $source $artifactDir -Force
            }
          }

      - name: Archive openppp2
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-${{ matrix.platform }}-${{ matrix.configuration }}
          path: artifact
          if-no-files-found: error