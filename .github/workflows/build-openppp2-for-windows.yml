name: 🪟 Windows Build (CMake + vcpkg)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
        include:
          - arch: x64
            runner: windows-latest
            vcpkg_triplet: x64-windows-static
          - arch: ARM64
            runner: windows-11-arm
            vcpkg_triplet: arm64-windows-static

    runs-on: ${{ matrix.runner }}
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      CMAKE_GENERATOR: "Visual Studio 17 2022"

    steps:
      - name: 📥 Checkout openppp2
        uses: actions/checkout@v4
        with:
          repository: liulilittle/openppp2
          path: openppp2

      - name: 🔢 Get CPU cores
        shell: pwsh
        run: echo "ncpu=$env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV

      - name: 📦 Setup vcpkg (Auto, No Manifest Required)
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone https://github.com/Microsoft/vcpkg.git vcpkg
          }
          .\vcpkg\bootstrap-vcpkg.bat
          echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 📚 Install Dependencies (Auto-Discovery)
        shell: pwsh
        run: |
          $pkgs = @(
            "boost-system", "boost-thread", "boost-asio", "boost-program-options",
            "boost-coroutine", "boost-context", "boost-regex", "boost-filesystem",
            "openssl"
          )
          if ("${{ matrix.arch }}" -eq "x64") {
            $pkgs += "jemalloc"
          }
          vcpkg install --triplet $env:VCPKG_DEFAULT_TRIPLET @pkgs --clean-after-build --allow-unsupported

      - name: 🧹 Prepare CMakeLists.txt (Remove GCC flags & Fix paths)
        shell: pwsh
        working-directory: openppp2
        run: |
          $content = Get-Content CMakeLists.txt -Raw

          # 1. 替换第三方库路径为环境变量
          $content = $content -replace 'SET\(THIRD_PARTY_LIBRARY_DIR .*\)', 'SET(THIRD_PARTY_LIBRARY_DIR $ENV{THIRD_PARTY_LIBRARY_DIR})'

          # 2. 移除所有 GCC/Clang 特有的 -Wno-* 警告标志（MSVC 无法识别）
          $content = $content -replace '\s*-Wno-[^\s\)]+', ''

          # 3. 如果是 ARM64，注释掉 jemalloc 引用
          if ("${{ matrix.arch }}" -eq "ARM64") {
            $content = $content -replace 'find_package\(jemalloc', '# find_package(jemalloc'
            $content = $content -replace 'target_link_libraries\(.*jemalloc', '# target_link_libraries(... jemalloc'
            Write-Host "✅ Jemalloc disabled for ARM64"
          }

          Set-Content -Path CMakeLists.txt -Value $content -NoNewline
          Write-Host "✅ CMakeLists.txt patched successfully"

      - name: 📐 Configure CMake
        shell: pwsh
        run: |
          # 防止 vcpkg 工具链内部产生无效的策略版本参数
          $env:CMAKE_POLICY_VERSION_MINIMUM = "3.5"

          $env:THIRD_PARTY_LIBRARY_DIR = "${{ github.workspace }}\vcpkg\installed\${{ matrix.vcpkg_triplet }}"

          cd openppp2
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build

          cmake .. `
            -G "$env:CMAKE_GENERATOR" `
            -A ${{ matrix.arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_CXX_STANDARD_REQUIRED=ON `
            -DCMAKE_CXX_FLAGS="/std:c++17" `
            -DCMAKE_C_FLAGS="/std:c11" `
            -DCOMPILER_SUPPORTS_CXX17=1 `
            -DCOMPILER_SUPPORTS_CXX1Z=1 `
            -DCOMPILER_SUPPORTS_CXX14=1 `
            -DCOMPILER_SUPPORTS_CXX11=1 `
            -DCMAKE_CXX_COMPILER_WORKS=1 `
            -DCMAKE_C_COMPILER_WORKS=1 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: 🛠️ Build
        shell: pwsh
        run: |
          cd openppp2\build
          cmake --build . --config Release --parallel $env:ncpu

      - name: 📦 Collect Artifacts
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $possiblePaths = @(
            "openppp2\build\Release",
            "openppp2\bin\Release",
            "openppp2\${{ matrix.arch }}\Release"
          )
          $found = $false
          foreach ($p in $possiblePaths) {
            $full = Join-Path $env:GITHUB_WORKSPACE $p
            if (Test-Path $full) {
              Copy-Item -Path "$full\*" -Destination $artifactDir -Recurse -Force
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Warning "No standard output directory found. Searching recursively for ppp.exe..."
            $exe = Get-ChildItem -Path openppp2 -Filter ppp.exe -Recurse | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName $artifactDir -Force
            } else {
              throw "ppp.exe not found!"
            }
          }

          $resourceFiles = @(
            'appsettings.json', 'cacert.pem', 'cacert.sha256',
            'dns-rules.txt', 'firewall-rules.txt', 'ip.txt', 'cmcc.txt',
            'starrylink.net.key', 'starrylink.net.pem'
          )
          foreach ($file in $resourceFiles) {
            $src = Join-Path $env:GITHUB_WORKSPACE "openppp2\$file"
            if (Test-Path $src) { Copy-Item $src $artifactDir -Force }
          }

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-${{ matrix.arch }}
          path: artifact