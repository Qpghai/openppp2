name: 🪟 Windows Build (CMake + vcpkg)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]
        include:
          - arch: x64
            runner: windows-latest
            vcpkg_triplet: x64-windows-static
          - arch: ARM64
            runner: windows-11-arm
            vcpkg_triplet: arm64-windows-static

    runs-on: ${{ matrix.runner }}
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - name: 📥 Checkout openppp2
        uses: actions/checkout@v4
        with:
          repository: liulilittle/openppp2
          path: openppp2

      - name: 🔢 Get CPU cores
        shell: pwsh
        run: echo "ncpu=$env:NUMBER_OF_PROCESSORS" >> $env:GITHUB_ENV

      - name: 📦 Setup vcpkg (Auto, No Manifest Required)
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone https://github.com/Microsoft/vcpkg.git vcpkg
          }
          .\vcpkg\bootstrap-vcpkg.bat
          echo "${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: 📚 Install Dependencies
        shell: pwsh
        run: |
          $pkgs = @(
            "boost-system", "boost-thread", "boost-asio", "boost-program-options",
            "boost-coroutine", "boost-context", "boost-regex", "boost-filesystem",
            "openssl"
          )
          if ("${{ matrix.arch }}" -eq "x64") {
            $pkgs += "jemalloc"
          }
          vcpkg install --triplet $env:VCPKG_DEFAULT_TRIPLET @pkgs --clean-after-build --allow-unsupported

      - name: 🧹 Generate Windows-compatible CMakeLists.txt
        shell: pwsh
        working-directory: openppp2
        run: |
          # 备份原文件
          Copy-Item CMakeLists.txt CMakeLists.txt.bak

          # 生成全新的 Windows 专用 CMakeLists.txt
          @"
          CMAKE_MINIMUM_REQUIRED(VERSION 3.5)
          PROJECT(ppp C CXX)

          # Windows specific settings
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          # Use vcpkg toolchain
          if(NOT DEFINED CMAKE_TOOLCHAIN_FILE)
              message(FATAL_ERROR "CMAKE_TOOLCHAIN_FILE must be set to vcpkg.cmake")
          endif()

          # Boost configuration
          set(BOOST_ROOT "$ENV{VCPKG_ROOT}/installed/$ENV{VCPKG_DEFAULT_TRIPLET}")
          set(Boost_USE_STATIC_LIBS ON)
          set(Boost_USE_DEBUG_LIBS OFF)
          set(Boost_USE_RELEASE_LIBS ON)
          set(Boost_NO_BOOST_CMAKE ON)  # Use CMake's built-in FindBoost
          find_package(Boost REQUIRED COMPONENTS system thread coroutine context regex filesystem)

          # OpenSSL
          find_package(OpenSSL REQUIRED)

          # Jemalloc only on x64
          if("${{ matrix.arch }}" STREQUAL "x64")
              find_package(jemalloc CONFIG REQUIRED)
              add_definitions(-DJEMALLOC)
          else()
              message(STATUS "Jemalloc disabled for ARM64")
          endif()

          # Common definitions
          add_definitions(-DFUNCTION -DBUDDY_ALLOC_IMPLEMENTATION -DWIN32 -D_WINDOWS)

          # Compiler flags for MSVC
          set(CMAKE_C_FLAGS_RELEASE "/O2 /MT")
          set(CMAKE_CXX_FLAGS_RELEASE "/O2 /MT")
          set(CMAKE_C_FLAGS_DEBUG "/Od /MTd /D_DEBUG")
          set(CMAKE_CXX_FLAGS_DEBUG "/Od /MTd /D_DEBUG")

          # Source files (excluding linux/darwin paths)
          file(GLOB_RECURSE SOURCE_FILES
              main.cpp
              common/lwip/my/*.c
              common/lwip/core/*.c
              common/lwip/api/*.c
              common/aggligator/*.cpp
              common/base64/*.cpp
              common/chnroutes2/*.cpp
              common/json/src/*.cpp
              common/libtcpip/*.cpp
              common/dnslib/*.cpp
              common/unix/*.c
              common/unix/*.cpp
              common/aesni/aes.cpp
              ppp/*.c
              ppp/*.cpp
              win32/*.c
              win32/*.cpp
          )

          # Explicitly remove any linux/darwin files that might have been globbed (safety)
          list(FILTER SOURCE_FILES EXCLUDE REGEX ".*/linux/.*")
          list(FILTER SOURCE_FILES EXCLUDE REGEX ".*/darwin/.*")

          # AES NI files (optional)
          file(GLOB_RECURSE AES_NI_SOURCE_FILES common/aesni/impl/*.c common/aesni/impl/*.cpp)

          # Create executable
          add_executable(${PROJECT_NAME} ${SOURCE_FILES} ${AES_NI_SOURCE_FILES})
          set_target_properties(${PROJECT_NAME} PROPERTIES
              RUNTIME_OUTPUT_DIRECTORY "${CMAKE_BINARY_DIR}/../bin"
          )

          # Include directories
          target_include_directories(${PROJECT_NAME} PRIVATE
              ${PROJECT_SOURCE_DIR}
              ${PROJECT_SOURCE_DIR}/common
              ${PROJECT_SOURCE_DIR}/common/json/include
              ${PROJECT_SOURCE_DIR}/common/lwip/my
              ${PROJECT_SOURCE_DIR}/common/lwip/include
              ${Boost_INCLUDE_DIRS}
          )

          # Link libraries
          target_link_libraries(${PROJECT_NAME} PRIVATE
              ${Boost_LIBRARIES}
              OpenSSL::SSL OpenSSL::Crypto
          )

          if("${{ matrix.arch }}" STREQUAL "x64")
              target_link_libraries(${PROJECT_NAME} PRIVATE jemalloc)
          endif()

          # Windows system libraries
          target_link_libraries(${PROJECT_NAME} PRIVATE
              ws2_32
              iphlpapi
              userenv
              bcrypt
          )

          # Disable common MSVC warnings
          target_compile_options(${PROJECT_NAME} PRIVATE /W3 /wd4996 /wd4244 /wd4267)
          "@ | Set-Content -Path CMakeLists.txt -NoNewline

          Write-Host "✅ Generated Windows-specific CMakeLists.txt"

      - name: 📐 Configure CMake
        shell: pwsh
        run: |
          cd openppp2
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build

          cmake .. `
            -G "$env:CMAKE_GENERATOR" `
            -A ${{ matrix.arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: 🛠️ Build
        shell: pwsh
        run: |
          cd openppp2\build
          cmake --build . --config Release --parallel $env:ncpu

      - name: 📦 Collect Artifacts
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifact'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $possiblePaths = @(
              "openppp2\bin",
              "openppp2\build\Release",
              "openppp2\build\bin\Release"
          )
          $found = $false
          foreach ($p in $possiblePaths) {
              $full = Join-Path $env:GITHUB_WORKSPACE $p
              if (Test-Path $full) {
                  Copy-Item -Path "$full\*" -Destination $artifactDir -Recurse -Force
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              Write-Warning "No standard output directory found. Searching recursively for ppp.exe..."
              $exe = Get-ChildItem -Path openppp2 -Filter ppp.exe -Recurse | Select-Object -First 1
              if ($exe) {
                  Copy-Item $exe.FullName $artifactDir -Force
              } else {
                  throw "ppp.exe not found!"
              }
          }

          $resourceFiles = @(
              'appsettings.json', 'cacert.pem', 'cacert.sha256',
              'dns-rules.txt', 'firewall-rules.txt', 'ip.txt', 'cmcc.txt',
              'starrylink.net.key', 'starrylink.net.pem'
          )
          foreach ($file in $resourceFiles) {
              $src = Join-Path $env:GITHUB_WORKSPACE "openppp2\$file"
              if (Test-Path $src) { Copy-Item $src $artifactDir -Force }
          }

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-${{ matrix.arch }}
          path: artifact